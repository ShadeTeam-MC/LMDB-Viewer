# Plugin coordinates
pluginGroup = team.shade
pluginVersion = 0.9.0

# Build/sandbox against a current IDE (2025.2) so the Gradle JVM-support matrix can parse Java 25;
# sinceBuild stays 242 so the released plugin still supports IDEs from 2024.2 onward.
platformType = IC
platformVersion = 2025.2

# Gradle / JVM
org.gradle.jvmargs = -Xmx2048m -Dfile.encoding=UTF-8
# Configuration cache is currently incompatible with the Kotlin compile classpath snapshot; keep off.
org.gradle.configuration-cache = false
org.gradle.caching = true
kotlin.stdlib.default.dependency = false
